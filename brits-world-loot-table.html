<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRITS WORLDS PVE — Loot Table</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#181a1b;
  --surface:#222425;
  --surface2:#2c2e2f;
  --surface3:#333536;
  --border:#3a3c3d;
  --border-gold:#c9a44a;
  --border-gold-dim:rgba(201,164,74,.25);
  --border-gold-med:rgba(201,164,74,.45);
  --gold:#c9a44a;
  --gold-light:#e0c776;
  --gold-dark:#a88530;
  --text:#d4d0c8;
  --text-bright:#eae6dc;
  --text-dim:#8a8680;
  --text-muted:#5e5b56;
  --green:#7fb840;
  --green-dim:rgba(127,184,64,.15);
  --red:#c44030;
  --red-dim:rgba(196,64,48,.15);
  --blue:#5a9fcf;
  --blue-dim:rgba(90,159,207,.15);
  --purple:#9a6fd0;
  --purple-dim:rgba(154,111,208,.15);
  --orange:#cf8a30;
  --orange-dim:rgba(207,138,48,.15);
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#4a4c4d}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow Condensed','Segoe UI',sans-serif}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes goldPulse{
  0%,100%{box-shadow:0 0 6px rgba(201,164,74,.2),0 0 12px rgba(201,164,74,.08)}
  50%{box-shadow:0 0 14px rgba(201,164,74,.4),0 0 28px rgba(201,164,74,.12)}
}

.header{
  background:linear-gradient(180deg,#1f2122 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
  padding:16px 0 14px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.5);
}
.header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--border-gold-med) 50%,transparent 100%);
}
.container{max-width:1440px;margin:0 auto;padding:0 20px}

.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.logo-icon{
  width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#3a3530,#252220);
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  animation:goldPulse 3s ease-in-out infinite;flex-shrink:0;
  box-shadow:inset 0 0 10px rgba(0,0,0,.4);
}
.logo-icon svg{width:24px;height:24px;fill:none;stroke:var(--gold-light);stroke-width:2;filter:drop-shadow(0 0 3px rgba(201,164,74,.4))}
.logo-title{
  font-family:'Bebas Neue',sans-serif;font-size:36px;font-weight:400;
  letter-spacing:4px;color:var(--gold-light);line-height:1;text-transform:uppercase;
  text-shadow:0 0 20px rgba(201,164,74,.2);
}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;margin-top:3px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-shrink:0}
.counter{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:3px 10px}

.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;display:flex;align-items:center}
.search-icon svg{width:15px;height:15px;stroke:var(--text-dim)}
.search-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:3px;padding:9px 14px 9px 36px;color:var(--text-bright);
  font-size:15px;font-family:'Barlow Condensed',sans-serif;font-weight:500;
  outline:none;transition:all .2s;letter-spacing:.3px;
}
.search-input:focus{border-color:var(--border-gold);background:var(--surface2);box-shadow:0 0 0 1px var(--border-gold-dim)}
.search-input::placeholder{color:var(--text-muted)}

.filter-section{margin-bottom:5px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.filter-label{
  font-size:10px;color:var(--text-muted);font-family:'Share Tech Mono',monospace;
  margin-right:3px;text-transform:uppercase;letter-spacing:1.5px;flex-shrink:0;min-width:80px;
  display:flex;align-items:center;gap:4px;
}
.filter-label svg{width:11px;height:11px;stroke:var(--text-muted);flex-shrink:0}
.fbtn{
  background:var(--surface);border:1px solid var(--border);border-radius:2px;
  padding:3px 10px;color:var(--text-dim);font-size:12px;font-weight:600;
  font-family:'Barlow Condensed',sans-serif;cursor:pointer;transition:all .15s ease;
  white-space:nowrap;line-height:1.4;letter-spacing:.4px;
}
.fbtn:hover{border-color:var(--border-gold-dim);color:var(--text);background:var(--surface2)}
.fbtn.active{background:var(--surface2);border-color:var(--border-gold);color:var(--gold-light);box-shadow:0 0 6px rgba(201,164,74,.1)}
.fbtn.cat-active{color:var(--ct);background:var(--cb);border-color:var(--cbd)}
.fbtn.diff-active{background:var(--db);border-color:var(--dbd);color:var(--dc)}

.clear-btn{
  background:transparent;border:1px solid var(--border);border-radius:2px;
  padding:3px 10px;color:var(--red);font-size:11px;font-weight:600;
  font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .15s;margin-left:auto;flex-shrink:0;
}
.clear-btn:hover{background:var(--red-dim);border-color:var(--red)}
.clear-btn.hidden{display:none}

.sort-select{
  background:var(--surface);border:1px solid var(--border);border-radius:2px;
  padding:3px 8px;color:var(--text-dim);font-size:11px;font-family:'Share Tech Mono',monospace;
  cursor:pointer;outline:none;
}
.sort-select:focus{border-color:var(--border-gold)}
.sort-select option{background:var(--surface);color:var(--text)}

.active-filters{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;margin-bottom:4px}
.active-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--border-gold-dim);border:1px solid var(--border-gold-med);
  border-radius:2px;padding:2px 8px;font-size:10px;font-family:'Share Tech Mono',monospace;
  color:var(--gold-light);animation:fadeIn .2s ease;
}
.active-tag button{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:0;line-height:1}
.active-tag button:hover{color:#f87171}

.divider{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px}

.content{max-width:1440px;margin:0 auto;padding:16px 20px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}

.stats-bar{
  display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px;padding:10px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:3px;
  border-top:2px solid var(--gold);position:relative;
}
.stats-bar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;
}
.stat{text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:26px;font-weight:400;line-height:1;letter-spacing:1px}
.stat-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}

.item-card{
  background:var(--surface);border:1px solid var(--border);border-radius:3px;
  padding:10px 14px;cursor:pointer;transition:all .18s ease;
  border-left:3px solid var(--border);animation:fadeIn .2s ease both;position:relative;
}
.item-card:hover{background:var(--surface2);border-color:#4a4c4d}
.item-card.selected{border-color:var(--cat-border);background:var(--surface2)}
.item-card-inner{display:flex;justify-content:space-between;align-items:center}
.item-info{flex:1;min-width:0}
.item-cat{font-family:'Share Tech Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px}
.item-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;letter-spacing:.3px}
.item-count{border-radius:50%;width:42px;height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;margin-left:10px;border:2px solid;position:relative}
.item-count-num{font-family:'Bebas Neue',sans-serif;font-size:18px;font-weight:400;line-height:1;letter-spacing:.5px}
.item-count-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text-muted);text-transform:uppercase;line-height:1}
.item-locs{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap}
.item-loc-icon{
  background:var(--surface2);border:1px solid var(--border);border-radius:50%;
  width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;
}
.item-loc-icon svg{width:12px;height:12px;stroke:var(--text-dim)}
.item-loc-icon:hover{border-color:var(--border-gold);background:var(--surface3)}
.item-loc-icon:hover svg{stroke:var(--gold-light)}
.item-loc-more{font-size:10px;color:var(--text-muted);font-family:'Share Tech Mono',monospace;align-self:center;margin-left:2px}

.detail-panel{
  border-radius:4px;padding:20px 24px;margin-bottom:24px;animation:fadeIn .25s ease;
  border:1px solid;position:relative;overflow:hidden;background:var(--surface)!important;
}
.detail-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5;
}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.detail-cat{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase}
.detail-name{font-family:'Bebas Neue',sans-serif;font-size:32px;font-weight:400;color:var(--gold-light);letter-spacing:3px;margin-top:2px}
.close-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:3px;
  padding:6px 14px;color:var(--text-dim);cursor:pointer;font-size:13px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;transition:all .15s;letter-spacing:.5px;
}
.close-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border-gold)}

.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:8px}
.detail-loc{
  background:var(--surface2);border-radius:3px;padding:10px 14px;
  border:1px solid var(--border);transition:border-color .2s;
}
.detail-loc:hover{border-color:var(--border-gold-dim)}
.detail-loc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.detail-loc-icon{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface);border:1.5px solid var(--gold-dark);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.detail-loc-icon svg{width:14px;height:14px;stroke:var(--gold-light)}
.detail-loc-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text-bright);text-transform:uppercase;letter-spacing:.8px}

.special-box{
  background:var(--surface2);border-radius:3px;padding:16px 20px;
  border:1px solid var(--border-gold-med);display:flex;align-items:center;gap:14px;
}
.special-box .sp-icon{
  width:40px;height:40px;border-radius:50%;
  background:var(--surface);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.special-box .sp-icon svg{width:20px;height:20px;stroke:var(--gold-light)}
.special-box .sp-text{color:var(--text-bright);font-size:15px;font-weight:600;letter-spacing:.3px}

.badges{display:flex;flex-wrap:wrap;gap:3px}
.badge{border-radius:2px;padding:2px 7px;font-size:11px;font-weight:600;font-family:'Share Tech Mono',monospace;white-space:nowrap;letter-spacing:.3px}
.check-mark{color:var(--green);font-weight:700;font-size:18px}

.empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif}
.empty-icon{margin-bottom:12px;display:flex;justify-content:center}
.empty-icon svg{width:48px;height:48px;stroke:var(--text-muted)}
.empty-text{font-size:20px;font-weight:600;letter-spacing:1px;color:var(--text-dim)}
.empty-sub{font-size:14px;margin-top:8px}

.footer{
  text-align:center;padding:20px;font-family:'Share Tech Mono',monospace;
  font-size:10px;color:var(--text-muted);letter-spacing:2px;
  border-top:1px solid var(--border);margin-top:32px;
}
.footer span{color:var(--gold-dark)}

@media(max-width:768px){
  .logo-title{font-size:26px;letter-spacing:3px}
  .detail-name{font-size:24px}
  .grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .counter{display:none}
  .filter-label{min-width:auto;width:100%}
  .stats-bar{gap:12px;padding:8px 12px}
  .stat-num{font-size:20px}
  .logo-icon{width:40px;height:40px}
  .logo-icon svg{width:20px;height:20px}
}
</style>
</head>
<body>

<div class="header">
  <div class="container">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      </div>

      </div>

    <div class="search-wrap">

      <input class="search-input" type="text" placeholder="Search items by name..." id="searchInput">

    <div id="filtersContainer"></div>
  </div>
</div>

<div class="content">
  <div id="statsBar"></div>
  <div id="detailPanel"></div>
  <div class="grid" id="itemGrid"></div>

</div>

<div class="footer">BRITS WORLDS PVE <span>&#9670;</span> CUSTOM LOOT TABLE REFERENCE</div>

<script>
const IC={
  "Deep Sea":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>`,

  "Harbor":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>`,
  "Airfield Event":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>`,
  "Dungeons":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-4h6v4"/><path d="M10 10h.01M14 10h.01"/></svg>`,
  "Heli's":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18"/><path d="M12 3v6"/><rect x="6" y="9" width="12" height="6" rx="3"/><path d="M12 15v3"/><path d="M8 18h8"/></svg>`,

  "Brads":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
  "Supply Drop":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>`,

};
function locIcon(loc,size){const s=size||14;const svg=IC[loc]||IC["Special"];return svg.replace('<svg ',`<svg width="${s}" height="${s}" `);}

const ITEMS=[
  {name:"Brit's Broken Pickaxe",category:"Weapons",sources:{"Deep Sea":"Canon | Cargo Military Crates","Dome Event":"Elite / Heli","Water Treatment":"Elite","Sat Dish":"Elite","Harbor":"Elite","Dungeons":"Easy | Normal","Heli's":"Easy | MultiEasy | Med | MultiMed | MultiHard","Supply Drop":"✓"}},
  {name:"Brit's Broken Axe",category:"Weapons",sources:{"Deep Sea":"Canon | Cargo Military Crates","Dome Event":"Elite","Water Treatment":"Elite","Sat Dish":"Elite","Harbor":"Elite","Dungeons":"Normal | Med | Hard | NM","Heli's":"Easy | MultiEasy | Med | MultiMed | MultiHard","Brads":"Easy","Supply Drop":"✓"}},

const ALL_LOCATIONS=["Deep Sea","Drone Boss","Dome Event","Water Treatment","Sat Dish","Harbor","Airfield Event","Dungeons","Heli's","Raids","Brads","Supply Drop","Special"];
const CATEGORIES=[...new Set(ITEMS.map(i=>i.category))];
const CAT_COLORS={
  "Weapons":{bg:"rgba(196,64,48,0.10)",border:"#c44030",text:"#e08070",accent:"#c44030"},
  "Guns":{bg:"rgba(90,159,207,0.10)",border:"#5a9fcf",text:"#8ac0e0",accent:"#5a9fcf"},
  "Special":{bg:"rgba(201,164,74,0.10)",border:"#c9a44a",text:"#e0c776",accent:"#c9a44a"},
  "Leviathan Set":{bg:"rgba(50,180,160,0.08)",border:"#32b4a0",text:"#60d4c0",accent:"#32b4a0"},
  "Impact Set":{bg:"rgba(90,159,207,0.08)",border:"#5a9fcf",text:"#80bce0",accent:"#5a9fcf"},
  "Dragon Thorns Set":{bg:"rgba(127,184,64,0.08)",border:"#7fb840",text:"#a0d060",accent:"#7fb840"},
  "Special Weapons":{bg:"rgba(207,138,48,0.10)",border:"#cf8a30",text:"#e0b060",accent:"#cf8a30"},
  "Tools":{bg:"rgba(201,164,74,0.08)",border:"#a88530",text:"#d4b860",accent:"#a88530"},
};
const DIFF_MAP={
  "Easy":{color:"#7fb840",order:1},"MultiEasy":{color:"#7fb840",order:2},
  "Normal":{color:"#5a9fcf",order:3},
  "Med":{color:"#cf8a30",order:4},"Medium":{color:"#cf8a30",order:4},"MultiMed":{color:"#cf8a30",order:5},
  "Hard":{color:"#cf6030",order:6},"MultiHard":{color:"#cf6030",order:7},
  "Nightmare":{color:"#c44030",order:8},"NM":{color:"#c44030",order:8},
  "Expert":{color:"#9a6fd0",order:9},
  "Elite":{color:"#a880d0",order:10},
  "Legendary":{color:"#c9a44a",order:11},"Leg":{color:"#c9a44a",order:11},
  "Locked":{color:"#8a8680",order:12},
  "Heli":{color:"#5a9fcf",order:13},"Brad":{color:"#cf6030",order:14},
};

const allDiffsSet=new Set();
ITEMS.forEach(item=>{Object.entries(item.sources).forEach(([loc,val])=>{if(loc==="Deep Sea"||loc==="Special"||val==="✓")return;val.split(/[|\/]/).map(s=>s.trim()).filter(Boolean).forEach(d=>{if(DIFF_MAP[d])allDiffsSet.add(d)})})});
const ALL_DIFFS=[...allDiffsSet].sort((a,b)=>(DIFF_MAP[a]?.order||99)-(DIFF_MAP[b]?.order||99));
const allCrateSet=new Set();
ITEMS.forEach(item=>{const ds=item.sources["Deep Sea"];if(!ds)return;ds.split(/[|,&]/).map(s=>s.trim()).filter(Boolean).forEach(c=>{if(c.length>2)allCrateSet.add(c)})});
const ALL_CRATES=[...allCrateSet].sort();

let S={search:"",category:"All",location:"All",difficulty:"All",crateType:"All",supplyDrop:"All",sort:"default",selected:null};
function hasFilters(){return S.search||S.category!=="All"||S.location!=="All"||S.difficulty!=="All"||S.crateType!=="All"||S.supplyDrop!=="All"}
function clearAll(){S.search="";S.category="All";S.location="All";S.difficulty="All";S.crateType="All";S.supplyDrop="All";document.getElementById("searchInput").value="";renderFilters();render();}
function getDiffColor(t){if(!t)return"#8a8680";for(const[k,v]of Object.entries(DIFF_MAP))if(t.includes(k))return v.color;return"#8a8680"}
function makeBadges(text){
  if(!text)return"";
  if(text==="✓")return'<span class="check-mark">✓</span>';
  return'<div class="badges">'+text.split("|").map(p=>{p=p.trim();const c=getDiffColor(p);return`<span class="badge" style="background:${c}15;color:${c};border:1px solid ${c}30">${p}</span>`}).join("")+"</div>";
}
function itemHasDiff(item,diff){return Object.entries(item.sources).some(([loc,val])=>{if(loc==="Deep Sea"||loc==="Special"||val==="✓")return false;return val.split(/[|\/]/).map(s=>s.trim()).includes(diff)})}
function itemHasCrate(item,crate){const ds=item.sources["Deep Sea"];if(!ds)return false;return ds.split(/[|,&]/).map(s=>s.trim()).some(c=>c===crate)}
function itemHasSD(item){return item.sources["Supply Drop"]==="✓"}
function getFiltered(){
  let r=ITEMS.filter(item=>{
    if(S.search&&!item.name.toLowerCase().includes(S.search.toLowerCase()))return false;
    if(S.category!=="All"&&item.category!==S.category)return false;
    if(S.location!=="All"&&!item.sources[S.location])return false;
    if(S.difficulty!=="All"&&!itemHasDiff(item,S.difficulty))return false;
    if(S.crateType!=="All"&&!itemHasCrate(item,S.crateType))return false;
    if(S.supplyDrop==="Yes"&&!itemHasSD(item))return false;
    if(S.supplyDrop==="No"&&itemHasSD(item))return false;
    return true;
  });
  switch(S.sort){
    case"name-asc":r.sort((a,b)=>a.name.localeCompare(b.name));break;
    case"name-desc":r.sort((a,b)=>b.name.localeCompare(a.name));break;
    case"drops-desc":r.sort((a,b)=>Object.keys(b.sources).length-Object.keys(a.sources).length);break;
    case"drops-asc":r.sort((a,b)=>Object.keys(a.sources).length-Object.keys(b.sources).length);break;
  }
  return r;
}

const FI={
  cat:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>`,
  loc:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`,
  diff:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  crate:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>`,
  sd:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  sort:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>`,
};

function renderFilters(){
  const fc=document.getElementById("filtersContainer");let h="";
  h+=`<div class="filter-section"><span class="filter-label">${FI.cat} Category</span>`;
  h+=`<button class="fbtn ${S.category==="All"?"active":""}" data-f="cat" data-v="All">All</button>`;
  CATEGORIES.forEach(cat=>{const c=CAT_COLORS[cat];const a=S.category===cat;h+=`<button class="fbtn ${a?"cat-active":""}" data-f="cat" data-v="${cat}" style="--ct:${c.text};--cb:${c.bg};--cbd:${c.border}">${cat}</button>`});
  h+=`</div>`;
  h+=`<div class="filter-section"><span class="filter-label">${FI.loc} Location</span>`;
  h+=`<button class="fbtn ${S.location==="All"?"active":""}" data-f="loc" data-v="All">All</button>`;
  ALL_LOCATIONS.filter(l=>l!=="Special").forEach(loc=>{h+=`<button class="fbtn ${S.location===loc?"active":""}" data-f="loc" data-v="${loc}">${loc}</button>`});
  h+=`</div>`;
  h+=`<div class="filter-section"><span class="filter-label">${FI.diff} Difficulty</span>`;
  h+=`<button class="fbtn ${S.difficulty==="All"?"active":""}" data-f="diff" data-v="All">All</button>`;
  ALL_DIFFS.forEach(d=>{const dm=DIFF_MAP[d];const a=S.difficulty===d;h+=`<button class="fbtn ${a?"diff-active":""}" data-f="diff" data-v="${d}" style="--db:${dm.color}15;--dbd:${dm.color}50;--dc:${dm.color};font-family:'Share Tech Mono',monospace;font-size:11px">${d}</button>`});
  h+=`</div>`;
  h+=`<div class="filter-section"><span class="filter-label">${FI.crate} Sea Source</span>`;
  h+=`<button class="fbtn ${S.crateType==="All"?"active":""}" data-f="crate" data-v="All">All</button>`;
  ALL_CRATES.forEach(c=>{h+=`<button class="fbtn ${S.crateType===c?"active":""}" data-f="crate" data-v="${c}">${c}</button>`});
  h+=`</div>`;
  h+=`<div class="filter-section"><span class="filter-label">${FI.sd} Supply</span><button class="fbtn ${S.supplyDrop==="All"?"active":""}" data-f="sd" data-v="All">All</button><button class="fbtn ${S.supplyDrop==="Yes"?"active":""}" data-f="sd" data-v="Yes">Yes</button><button class="fbtn ${S.supplyDrop==="No"?"active":""}" data-f="sd" data-v="No">No</button><span class="divider"></span><span class="filter-label" style="min-width:auto">${FI.sort} Sort</span><select class="sort-select" id="sortSel"><option value="default"${S.sort==="default"?" selected":""}>Default</option><option value="name-asc"${S.sort==="name-asc"?" selected":""}>Name A→Z</option><option value="name-desc"${S.sort==="name-desc"?" selected":""}>Name Z→A</option><option value="drops-desc"${S.sort==="drops-desc"?" selected":""}>Most drops</option><option value="drops-asc"${S.sort==="drops-asc"?" selected":""}>Least drops</option></select><button class="clear-btn${hasFilters()?"":" hidden"}" id="clearBtn">✕ Clear filters</button></div>`;
  const tags=[];
  if(S.category!=="All")tags.push({l:`Category: ${S.category}`,c:()=>{S.category="All"}});
  if(S.location!=="All")tags.push({l:`${S.location}`,c:()=>{S.location="All"}});
  if(S.difficulty!=="All")tags.push({l:`Difficulty: ${S.difficulty}`,c:()=>{S.difficulty="All"}});
  if(S.crateType!=="All")tags.push({l:`Source: ${S.crateType}`,c:()=>{S.crateType="All"}});
  if(S.supplyDrop!=="All")tags.push({l:`Supply Drop: ${S.supplyDrop}`,c:()=>{S.supplyDrop="All"}});
  if(S.search)tags.push({l:`Search: "${S.search}"`,c:()=>{S.search="";document.getElementById("searchInput").value=""}});
  if(tags.length>0){h+=`<div class="active-filters">`;tags.forEach((t,i)=>{h+=`<span class="active-tag">${t.l}<button data-ti="${i}">✕</button></span>`});h+=`</div>`}
  fc.innerHTML=h;
  fc.querySelectorAll(".fbtn").forEach(btn=>btn.addEventListener("click",()=>{const f=btn.dataset.f,v=btn.dataset.v;if(f==="cat")S.category=v;else if(f==="loc")S.location=v;else if(f==="diff")S.difficulty=v;else if(f==="crate")S.crateType=v;else if(f==="sd")S.supplyDrop=v;renderFilters();render()}));
  const ss=document.getElementById("sortSel");if(ss)ss.addEventListener("change",e=>{S.sort=e.target.value;render()});
  const cb=document.getElementById("clearBtn");if(cb)cb.addEventListener("click",clearAll);
  fc.querySelectorAll("button[data-ti]").forEach(btn=>btn.addEventListener("click",()=>{tags[parseInt(btn.dataset.ti)].c();renderFilters();render()}));
}

function renderStats(filtered){
  const el=document.getElementById("statsBar");const cats={};filtered.forEach(i=>{cats[i.category]=(cats[i.category]||0)+1});
  const sdC=filtered.filter(i=>itemHasSD(i)).length;const totL=filtered.reduce((s,i)=>s+Object.keys(i.sources).length,0);
  let h=`<div class="stats-bar">`;
  h+=`<div class="stat"><div class="stat-num" style="color:var(--gold-light)">${filtered.length}</div><div class="stat-label">Items</div></div>`;
  h+=`<div class="stat"><div class="stat-num" style="color:var(--green)">${totL}</div><div class="stat-label">Total drops</div></div>`;
  h+=`<div class="stat"><div class="stat-num" style="color:var(--blue)">${sdC}</div><div class="stat-label">Supply Drop</div></div>`;
  Object.keys(CAT_COLORS).forEach(cat=>{if(cats[cat])h+=`<div class="stat"><div class="stat-num" style="color:${CAT_COLORS[cat].accent}">${cats[cat]}</div><div class="stat-label">${cat}</div></div>`});
  h+=`</div>`;el.innerHTML=h;
}

function render(){
  const filtered=getFiltered();
  document.getElementById("counter").textContent=`${filtered.length} / ${ITEMS.length} items`;
  renderStats(filtered);
  const dp=document.getElementById("detailPanel");
  if(S.selected){
    const item=ITEMS.find(i=>i.name===S.selected);
    if(item){
      const c=CAT_COLORS[item.category];let locsHTML;
      if(item.sources["Special"]){
        locsHTML=`<div class="special-box"><span class="sp-icon">${locIcon("Special",20)}</span><span class="sp-text">${item.sources["Special"]}</span></div>`;
      }else{
        let idx=0;
        locsHTML='<div class="detail-grid">'+ALL_LOCATIONS.filter(l=>l!=="Special"&&item.sources[l]).map(loc=>{
          const delay=idx*0.04;idx++;
          return`<div class="detail-loc" style="animation:slideIn .25s ease ${delay}s both"><div class="detail-loc-header"><span class="detail-loc-icon">${locIcon(loc,14)}</span><span class="detail-loc-name">${loc}</span></div>${makeBadges(item.sources[loc])}</div>`;
        }).join("")+"</div>";
      }
      dp.innerHTML=`<div class="detail-panel" style="border-color:${c.border}40"><div class="detail-header"><div><span class="detail-cat" style="color:${c.accent}">${item.category}</span><div class="detail-name">${item.name}</div></div><button class="close-btn" onclick="S.selected=null;render()">✕ Close</button></div>${locsHTML}</div>`;
    }
  }else{dp.innerHTML="";}
  const grid=document.getElementById("itemGrid");
  if(filtered.length===0){
    grid.innerHTML="";
    document.getElementById("emptyState").innerHTML=`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div><div class="empty-text">No items found</div><div class="empty-sub">Try adjusting the filters or click "Clear filters"</div></div>`;
    return;
  }
  document.getElementById("emptyState").innerHTML="";
  grid.innerHTML=filtered.map((item,idx)=>{
    const c=CAT_COLORS[item.category];const isSel=S.selected===item.name;
    const lc=Object.keys(item.sources).length;
    const locs=Object.keys(item.sources).slice(0,7).map(l=>`<span class="item-loc-icon" title="${l}">${locIcon(l,12)}</span>`).join("");
    const more=lc>7?`<span class="item-loc-more">+${lc-7}</span>`:"";
    const delay=Math.min(idx*0.015,0.4);
    return`<div class="item-card${isSel?" selected":""}" style="border-left-color:${c.border};${isSel?`background:var(--surface2);border-color:${c.border}`:""}animation-delay:${delay}s;--cat-border:${c.border}" data-name="${item.name}"><div class="item-card-inner"><div class="item-info"><div class="item-cat" style="color:${c.accent}">${item.category}</div><div class="item-name">${item.name}</div></div><div class="item-count" style="background:${c.bg};border-color:${c.border}60"><div class="item-count-num" style="color:${c.accent}">${lc}</div><div class="item-count-label">drops</div></div></div><div class="item-locs">${locs}${more}</div></div>`;
  }).join("");
  grid.querySelectorAll(".item-card").forEach(card=>{card.addEventListener("click",()=>{const name=card.dataset.name;S.selected=S.selected===name?null:name;render();if(S.selected)document.getElementById("detailPanel").scrollIntoView({behavior:"smooth",block:"start"})})});
}

document.getElementById("searchInput").addEventListener("input",e=>{S.search=e.target.value;renderFilters();render()});
renderFilters();render();
</script>
